<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FWC HRMS — AI-Powered Human Resource Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    #root-loader { position:fixed;inset:0;background:#090b14;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s; }
    #root-loader.hide { opacity:0;pointer-events:none; }
    .loader-logo { width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:#fff;animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{transform:scale(1.05);box-shadow:0 0 0 12px rgba(34,197,94,0)} }
  </style>
</head>
<body>
  <div id="root-loader"><div class="loader-logo">FWC</div></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>window.addEventListener('load',()=>setTimeout(()=>document.getElementById('root-loader')?.classList.add('hide'),800))</script>
</body>
</html>
